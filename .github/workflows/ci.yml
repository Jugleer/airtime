name: gate

# Runs the canonical gate (typecheck && lint && test:run && build).
# Harmless until a remote exists; activates automatically once pushed.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run gate
